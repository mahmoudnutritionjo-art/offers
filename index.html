      background: #f6f7f9;
      border-bottom: 1px solid #e3e7ee;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cart-title {
      font-size: 18px;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .cart-count {
      background: rgba(244,49,49,.10);
      color: var(--red);
      border-radius: 999px;
      padding: 6px 8px;
      font-size: 10px;
      font-weight: 900;
    }

    .close {
      border: 0;
      background: transparent;
      font-size: 28px;
      color: #64748b;
      cursor: pointer;
    }

    .cart-body {
      overflow-y: auto;
      padding: 16px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .cart-img {
      width: 72px;
      height: 72px;
      background: #fff;
      border-radius: 10px;
      object-fit: contain;
    }

    .cart-name {
      font-size: 14px;
      font-weight: 900;
      line-height: 1.25;
    }

    .cart-brand {
      color: #a0a7b4;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      margin: 3px 0 8px;
    }

    .cart-options {
      color: #697386;
      font-size: 11px;
      line-height: 1.5;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .cart-options strong {
      color: var(--dark);
      font-weight: 900;
    }

    .cart-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .cart-price {
      color: var(--red);
      font-size: 15px;
      font-weight: 900;
    }

    .cart-foot {
      background: #fff;
      border-top: 1px solid #e4e8ef;
      padding: 16px;
    }

    .subtotal {
      display: flex;
      justify-content: space-between;
      margin-bottom: 14px;
      color: #667085;
      font-size: 15px;
      font-weight: 800;
    }

    .subtotal strong {
      color: var(--dark);
      font-size: 21px;
      font-weight: 900;
    }

    .checkout {
      width: 100%;
      height: 52px;
      border: 0;
      border-radius: 999px;
      background: #d92a2a;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 16px 35px rgba(223,53,47,.20);
      cursor: pointer;
    }

    .continue {
      width: 100%;
      border: 0;
      background: transparent;
      color: #9aa3b2;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding-top: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="app">
    <header class="topbar">
      <img src="https://www.firstnutrition.com/wp-content/uploads/2026/05/firstnutritionjo-logo.webp" alt="First Nutrition">
      <span>Hot Offer</span>
    </header>

    <main class="page">
      <section class="hero">
        <div class="hero-main">
          <div class="hero-img-box">
            <img id="mainProductImage" class="hero-img" src="https://github.com/mahmoudnutritionjo-art/offers/blob/main/Gold%20Standard%20100%25.webp?raw=true" alt="Gold Standard Whey">
          </div>

          <div>
            <div class="eyebrow">Premium Combo</div>
            <h1>Gold Standard Whey Combo</h1>
            <p>Choose 1 whey flavor + 1 extra product.</p>
          </div>
        </div>

        <div class="deal-row">
          <div class="deal-chip">1 Whey + 1 Extra Product</div>
          <div class="price-chip">
            <small>Final Price</small>
            <strong>100 JOD</strong>
          </div>
        </div>
      </section>

      <div class="steps">
        <div id="progress1" class="step active"><span class="num">1</span> Whey</div>
        <div id="progress2" class="step"><span class="num">2</span> Extra</div>
        <div id="progress3" class="step"><span class="num">3</span> Cart</div>
      </div>

      <section class="section whey">
        <div class="section-head">
          <div class="section-title-row">
            <div>
              <h2>Choose whey flavor</h2>
              <p>Swipe and select one flavor.</p>
            </div>
            <div class="tag red">Main</div>
          </div>
        </div>

        <div id="wheyGrid" class="whey-scroll"></div>
      </section>

      <section class="section extra">
        <div class="section-head">
          <div class="section-title-row">
            <div>
              <h2>Choose extra product</h2>
              <p>C4 and Xtend include flavor options.</p>
            </div>
            <div class="tag dark">Extra</div>
          </div>
        </div>

        <div id="productsGrid" class="product-list"></div>

        <div id="warning" class="warning">Please complete your selections before adding to cart.</div>
      </section>
    </main>

    <div class="sticky">
      <div class="sticky-summary">
        <div>
          <div class="summary-label">Your Selection</div>
          <div id="stickySummary" class="summary-text">Choose your combo first</div>
        </div>
        <div class="sticky-price">100 JOD</div>
      </div>

      <div class="sticky-actions">
        <div class="qty">
          <button id="minusBtn" type="button">-</button>
          <strong id="qtyText">1</strong>
          <button id="plusBtn" type="button">+</button>
        </div>

        <button id="addBtn" class="add-btn" type="button" disabled>ADD TO CART</button>
      </div>
    </div>
  </div>

  <div id="overlay" class="overlay"></div>

  <aside id="cart" class="cart">
    <div class="cart-head">
      <div class="cart-title">🛍️ Your Cart <span id="cartCount" class="cart-count">0 ITEMS</span></div>
      <button id="closeCart" class="close" type="button">×</button>
    </div>

    <div id="cartBody" class="cart-body"></div>

    <div class="cart-foot">
      <div class="subtotal">
        <span>Subtotal</span>
        <strong id="subtotalText">0 JOD</strong>
      </div>

      <button class="checkout" type="button">CHECKOUT NOW</button>
      <button id="continueBtn" class="continue" type="button">CONTINUE SHOPPING</button>
    </div>
  </aside>

  <script>
    const wheyFlavors = [
      {
        id: 'chocolate',
        name: 'Double Rich Chocolate',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/Gold%20Standard%20100%25.webp?raw=true'
      },
      {
        id: 'vanilla',
        name: 'Vanilla Ice Cream',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/Gold%20Standard%20100%25%20Vanilla%20Ice%20.webp?raw=true'
      },
      {
        id: 'banana',
        name: 'Banana Cream',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/Gold%20Standard%20100%25%20banana.webp?raw=true'
      },
      {
        id: 'strawberry',
        name: 'Delicious Strawberry',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/Gold%20Standard%20100%25%20Surawberrv.webp?raw=true'
      }
    ];

    const products = [
      {
        id: 'c4',
        name: 'C4 Original',
        type: 'Pre-Workout',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/C4%20Original.webp?raw=true',
        flavors: ['Watermelon', 'Icy Blue Raspberry', 'Pink Lemonade']
      },
      {
        id: 'xtend',
        name: 'Xtend Original BCAA',
        type: 'Recovery',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/extend.webp?raw=true',
        flavors: ['Knockout Fruit Punch', 'Mango Madness', 'Watermelon Explosion']
      },
      {
        id: 'curse',
        name: 'The Curse',
        type: 'Pre-Workout',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/The%20Curse.webp?raw=true',
        flavors: []
      },
      {
        id: 'citrulline',
        name: 'R1 Citrulline',
        type: 'Pump Support',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/R1-Citrulline.webp?raw=true',
        flavors: []
      },
      {
        id: 'lipo6',
        name: 'LIPO-6 Black Active Formula',
        type: 'Fat Burner',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/LIPO-6%20Black%20ActiveFormula.webp?raw=true',
        flavors: []
      },
      {
        id: 'amino9',
        name: 'R1 Essential Amino 9',
        type: 'Amino Acids',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/R1%20Essential%20Amino%209.webp?raw=true',
        flavors: []
      },
      {
        id: 'collagen',
        name: 'R1 Collagen Peptides',
        type: 'Collagen',
        image: 'https://github.com/mahmoudnutritionjo-art/offers/blob/main/R1%20Collagen%20Peptides.webp?raw=true',
        flavors: []
      }
    ];

    let selectedWhey = null;
    let selectedExtra = null;
    let selectedExtraFlavor = null;
    let qty = 1;
    let cartItems = [];

    const wheyGrid = document.getElementById('wheyGrid');
    const productsGrid = document.getElementById('productsGrid');
    const mainProductImage = document.getElementById('mainProductImage');
    const addBtn = document.getElementById('addBtn');
    const warning = document.getElementById('warning');
    const qtyText = document.getElementById('qtyText');
    const stickySummary = document.getElementById('stickySummary');

    const progress1 = document.getElementById('progress1');
    const progress2 = document.getElementById('progress2');
    const progress3 = document.getElementById('progress3');

    const overlay = document.getElementById('overlay');
    const cart = document.getElementById('cart');
    const cartBody = document.getElementById('cartBody');
    const cartCount = document.getElementById('cartCount');
    const subtotalText = document.getElementById('subtotalText');

    function renderWhey() {
      wheyGrid.innerHTML = wheyFlavors.map(item => \`
        <button class="card whey-card \${selectedWhey === item.id ? 'selected' : ''}" data-id="\${item.id}" type="button">
          <div class="img-box">
            <img src="\${item.image}" alt="\${item.name}">
          </div>
          <div class="item-name">\${item.name}</div>
          <div class="item-type">Gold Standard Whey 5 lbs</div>
        </button>
      \`).join('');

      document.querySelectorAll('#wheyGrid .card').forEach(card => {
        card.addEventListener('click', () => {
          selectedWhey = card.dataset.id;
          const whey = wheyFlavors.find(x => x.id === selectedWhey);
          if (whey) {
            mainProductImage.src = whey.image;
            mainProductImage.alt = whey.name;
          }
          update();
        });
      });
    }

    function renderProducts() {
      productsGrid.innerHTML = products.map(item => {
        const isSelected = selectedExtra === item.id;
        const hasFlavors = item.flavors.length > 0;

        return \`
          <button class="card \${hasFlavors ? 'has-flavors' : ''} \${isSelected ? 'selected' : ''}" data-id="\${item.id}" type="button">
            <div class="\${hasFlavors ? 'product-main' : 'product-card'}">
              <div class="img-box">
                <img src="\${item.image}" alt="\${item.name}">
              </div>

              <div>
                <div class="item-name">\${item.name}</div>
                <div class="item-type">\${item.type}</div>
                <div class="badge \${hasFlavors ? 'red' : ''}">
                  \${hasFlavors ? 'Choose Flavor' : 'Single Item'}
                </div>
              </div>
            </div>

            \${hasFlavors ? \`
              <div class="flavor-options">
                <div class="mini-label">Available Flavors</div>
                <div class="pills">
                  \${item.flavors.map(flavor => \`
                    <div class="pill \${selectedExtraFlavor === flavor && isSelected ? 'selected' : ''}" data-parent="\${item.id}" data-flavor="\${flavor}">
                      \${flavor}
                    </div>
                  \`).join('')}
                </div>
              </div>
            \` : ''}
          </button>
        \`;
      }).join('');

      document.querySelectorAll('#productsGrid .card').forEach(card => {
        card.addEventListener('click', e => {
          const pill = e.target.closest('.pill');

          if (pill) {
            selectedExtra = pill.dataset.parent;
            selectedExtraFlavor = pill.dataset.flavor;
            update();
            return;
          }

          const productId = card.dataset.id;
          const product = products.find(x => x.id === productId);

          if (selectedExtra !== productId) selectedExtraFlavor = null;
          selectedExtra = productId;
          if (!product.flavors.length) selectedExtraFlavor = null;

          update();
        });
      });
    }

    function isComplete() {
      const extra = products.find(x => x.id === selectedExtra);
      const needsFlavor = extra && extra.flavors.length > 0;
      return Boolean(selectedWhey && selectedExtra && (!needsFlavor || selectedExtraFlavor));
    }

    function updateProgress() {
      const complete = isComplete();
      progress1.className = 'step ' + (selectedWhey ? 'done' : 'active');
      progress2.className = 'step ' + (!selectedWhey ? '' : selectedExtra ? 'done' : 'active');
      progress3.className = 'step ' + (complete ? 'done' : '');
    }

    function updateSticky() {
      const whey = wheyFlavors.find(x => x.id === selectedWhey);
      const extra = products.find(x => x.id === selectedExtra);

      if (!whey && !extra) {
        stickySummary.textContent = 'Choose your combo first';
        return;
      }

      const wheyText = whey ? whey.name : 'Choose whey';
      const extraText = extra ? extra.name + (selectedExtraFlavor ? ' - ' + selectedExtraFlavor : '') : 'Choose extra';

      stickySummary.textContent = wheyText + ' • ' + extraText;
    }

    function update() {
      renderWhey();
      renderProducts();
      addBtn.disabled = !isComplete();
      warning.classList.toggle('show', !isComplete());
      qtyText.textContent = qty;
      updateProgress();
      updateSticky();
    }

    function openCart() {
      overlay.classList.add('show');
      cart.classList.add('show');
    }

    function closeCart() {
      overlay.classList.remove('show');
      cart.classList.remove('show');
    }

    function addToCart() {
      if (!isComplete()) {
        warning.classList.add('show');
        return;
      }

      const whey = wheyFlavors.find(x => x.id === selectedWhey);
      const extra = products.find(x => x.id === selectedExtra);

      cartItems.push({
        id: Date.now(),
        title: 'Gold Standard 100% Whey Offer 100JD',
        brand: 'FIRST NUTRITION',
        image: whey.image,
        wheyFlavor: whey.name,
        extraProduct: extra.name,
        extraFlavor: selectedExtraFlavor || '',
        qty,
        price: 100
      });

      renderCart();
      openCart();
    }

    function renderCart() {
      const totalQty = cartItems.reduce((sum, item) => sum + item.qty, 0);
      const subtotal = cartItems.reduce((sum, item) => sum + item.price * item.qty, 0);

      cartCount.textContent = totalQty + (totalQty === 1 ? ' ITEM' : ' ITEMS');
      subtotalText.textContent = subtotal + ' JOD';

      cartBody.innerHTML = cartItems.map(item => \`
        <div class="cart-item">
          <img class="cart-img" src="\${item.image}" alt="\${item.title}">
          <div>
            <div class="cart-name">\${item.title}</div>
            <div class="cart-brand">\${item.brand}</div>
            <div class="cart-options">
              <strong>Whey:</strong> \${item.wheyFlavor}<br>
              <strong>Extra:</strong> \${item.extraProduct}\${item.extraFlavor ? ' (' + item.extraFlavor + ')' : ''}
            </div>
            <div class="cart-line">
              <div class="cart-price">\${item.price} JOD</div>
              <div style="font-size:12px;font-weight:900;color:#697386;">Qty: \${item.qty}</div>
            </div>
          </div>
        </div>
      \`).join('');
    }

    document.getElementById('minusBtn').addEventListener('click', () => {
      qty = Math.max(1, qty - 1);
      qtyText.textContent = qty;
    });

    document.getElementById('plusBtn').addEventListener('click', () => {
      qty += 1;
      qtyText.textContent = qty;
    });

    addBtn.addEventListener('click', addToCart);
    document.getElementById('closeCart').addEventListener('click', closeCart);
    document.getElementById('continueBtn').addEventListener('click', closeCart);
    overlay.addEventListener('click', closeCart);

    update();
  <\/script>
</body>
</html>`;

    document.open();
    document.write(isMobile ? mobileHTML : desktopHTML);
    document.close();
  </script>
</head>
<body></body>
</html>
